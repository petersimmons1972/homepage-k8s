---
# configmap-template.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    theme: dark
  background: |
    image: https://images.unsplash.com/photo-1502790671504-542ad42d5189?auto=format&fit=crop&w=2560&q=80
    blur: sm # sm, "", md, xl... see https://tailwindcss.com/docs/backdrop-blur
    saturate: 50 # 0, 50, 100... see https://tailwindcss.com/docs/backdrop-saturate
    brightness: 50 # 0, 50, 75... see https://tailwindcss.com/docs/backdrop-brightness
    opacity: 50 # 0-100

  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
      - Github:
        - abbr: GH
          href: https://github.com/
      - Dashboard Icons:
        - abbr: DI
          href: https://dashboardicons.com/ 
      - Homepage: 
        - abbr: HP
          href: https://gethomepage.dev/
      
  services.yaml: |
    - Homelab Services:
      - Search Engine:
          href: ${SEARCH_DOMAIN}
          icon: searxng
      - Container Management:
          href: ${RANCHER_DOMAIN}
          icon: rancher 
      - Bookmark Manager:
          href: ${LINKWARDEN_DOMAIN}
          icon: linkwarden
      - Reverse Proxy:
          href: ${TRAEFIK_DOMAIN}
          icon: traefik
      - AI Interface:
          href: ${OPENWEBUI_DOMAIN}
          icon: open-webui
    - Infrastructure:
      - Virtualization:
          href: ${PROXMOX_DOMAIN}
          icon: proxmox
      - Network Storage:
          href: ${TRUENAS_DOMAIN}
          icon: truenas
      - DNS Filter 1:
          href: ${PIHOLE_1_IP}/admin
          icon: pi-hole
      - DNS Filter 2:
          href: ${PIHOLE_2_IP}/admin
          icon: pi-hole
      - Network Controller:
          href: ${UNIFI_IP}
          icon: unifi
      - VPN Service:
          href: https://login.tailscale.com/
          icon: tailscale
      - CDN & DNS:
          href: https://cloudflare.com/
          icon: cloudflare
          
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
